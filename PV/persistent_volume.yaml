---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv
spec:
  storageClassName: local-storage
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/mydata
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc
spec:
  storageClassName: local-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    run: pv-pod
  name: pv-pod
spec:
  volumes:
  - name: pvc-vol
    persistentVolumeClaim:
      claimName: pvc
  containers:
  - image: nginx
    name: pv-container
    volumeMounts:
    - name: pvc-vol
      mountPath: /mydata
  restartPolicy: Always





























